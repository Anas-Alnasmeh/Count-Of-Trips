<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Count Of Trips</title>
    <link rel="stylesheet" href="master.css">
</head>

<body>
    <div class="parent">
        <div class="info">
            <div class="day">Day Count<br><span></span></div>
            <div class="trip">Trip Count<br><span></span></div>
        </div>
        <button class="add" title="Click Here To Add Trip">Add Trip</button>
        <div class="circle">
            <span>0%</span>
            <svg>
                <circle class="circle-one"></circle>
                <circle class="circle-two"></circle>
            </svg>
        </div>
        <div class="end">
            <div class="one"><span>14%</span></div>
            <div class="two"><span>28%</span></div>
            <div class="three"><span>50%</span></div>
        </div>
        <button class="reset">Reset</button>
        <div class="back"></div>
        <div class="popup">
            <h3>Do you want to reset date and all trips?</h3>
            <div class="answer">
                <button class="yes">Yes</button>
                <button class="no">No</button>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>

</html>
